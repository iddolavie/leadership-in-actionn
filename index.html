    function TagSelector({ options, selected = [], onChange, max }) {
      const toggle = tag => {
        if (selected.includes(tag)) onChange(selected.filter(t => t !== tag));
        else if (max === undefined || selected.length < max) onChange([...selected, tag]);
      };
      return (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {options.map(tag => {
            const active = selected.includes(tag);
            const disabled = !active && max !== undefined && selected.length >= max;
            return (
              <button key={tag} onClick={() => toggle(tag)} disabled={disabled}
                style={{
                  padding: "7px 16px", borderRadius: 20,
                  border: active ? `2px solid ${C.yellow}` : `2px solid #909090`,
                  background: active ? C.yellow : "transparent",
                  color: active ? C.dark : disabled ? "#666" : C.white,
                  cursor: disabled ? "default" : "pointer",
                  fontSize: 13, fontFamily: FONT,
                  opacity: disabled ? 0.45 : 1,
                  fontWeight: active ? 700 : 400,
                  transition: "all 0.18s",
                }}
              >{tag}</button>
            );
          })}
        </div>
      );

    function SummaryPage({ allData, onRestart, initialInsights = "", initialClosingNote = "" }) {

        .concat(insights ? [`\nüí° *\u05EA\u05D5\u05D1\u05E0\u05D5\u05EA \u05D0\u05D9\u05E9\u05D9\u05D5\u05EA*\n${insights}`] : [])

      const generateShareUrl = () => {

          const payload = { s: allData, i: insights, c: closingNote };

      const shareUrl = IS_IFRAME ? null : generateShareUrl();

        ? `https://wa.me/?text=${encodeURIComponent("\u05E1\u05D9\u05DB\u05D5\u05DD \u05EA\u05D4\u05DC\u05D9\u05DA \u05DE\u05E0\u05D4\u05D9\u05D2\u05D5\u05EA \u05E4\u05D5\u05E2\u05DC\u05EA \u05E9\u05DC\u05D9:\n" + shareUrl)}`

      const mailUrl = shareUrl
        ? `mailto:?subject=${encodeURIComponent("\u05DE\u05E0\u05D4\u05D9\u05D2\u05D5\u05EA \u05E4\u05D5\u05E2\u05DC\u05EA \u2013 \u05E1\u05D9\u05DB\u05D5\u05DD \u05D4\u05EA\u05D4\u05DC\u05D9\u05DA")}&body=${encodeURIComponent("\u05E1\u05D9\u05DB\u05D5\u05DD \u05EA\u05D4\u05DC\u05D9\u05DA \u05DE\u05E0\u05D4\u05D9\u05D2\u05D5\u05EA \u05E4\u05D5\u05E2\u05DC\u05EA \u05E9\u05DC\u05D9:\n\n" + shareUrl)}`

                <button style={optionStyle} onClick={() => copyToClipboard(shareUrl || shareText)}>
                  <div style={iconBox(C.yellow)}>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={C.dark} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                  </div>
                  <div style={{ textAlign: "right" }}><div style={{ fontWeight: 700, fontSize: 15 }}>\u05D4\u05E2\u05EA\u05E7 \u05D8\u05E7\u05E1\u05D8</div><div style={{ color: C.muted, fontSize: 12 }}>\u05D4\u05D3\u05D1\u05E7 \u05D1\u05DB\u05DC \u05DE\u05E7\u05D5\u05DD</div></div>
                </button>
              </div>
            </div>
          )}

          <div style={{ maxWidth: 500, margin: "0 auto" }}>

            <div style={{ textAlign: "center", marginBottom: 36 }}>
              <div style={{ fontSize: 50, marginBottom: 10 }}>üéØ</div>
              <h1 style={{ color: C.yellow, fontSize: 28, fontWeight: 700, margin: "0 0 6px", fontFamily: FONT }}>
                \u05E1\u05D9\u05DB\u05D5\u05DD \u05D4\u05EA\u05D4\u05DC\u05D9\u05DA \u05E9\u05DC\u05DA
              </h1>
              <p style={{ color: C.muted, margin: 0, fontFamily: FONT }}>\u05DE\u05E0\u05D4\u05D9\u05D2\u05D5\u05EA \u05E4\u05D5\u05E2\u05DC\u05EA \u2013 Leadership in Action</p>
            </div>

            {[1, 2, 3, 4].map(stepNum => {
              const d = allData[stepNum];
              const questions = STEP_QUESTIONS[stepNum];
              const config = STEPS_CONFIG[stepNum - 1];
              const textQs = questions.filter(q => q.type !== "slider");
              const hasSlider = questions.some(q => q.type === "slider");
              const sliderVal = hasSlider && d[sliderKeys[stepNum]] !== undefined ? d[sliderKeys[stepNum]] : null;

              return (
                <div key={stepNum} style={{
                  background: C.bgCard, borderRadius: 14,
                  borderRight: `4px solid ${config.tagBg}`,
                  padding: 20, marginBottom: 14,
                }}>
                  {/* Step header */}
                  <div style={{
                    display: "flex", alignItems: "center", gap: 8,
                    marginBottom: 16, justifyContent: "flex-end",
                  }}>
                    <h3 style={{ color: C.white, margin: 0, fontSize: 17, fontFamily: FONT }}>{config.title}</h3>
                    <span style={{ fontSize: 18 }}>{config.icon}</span>
                    <span style={{
                      background: config.tagBg, color: config.tagColor,
                      padding: "3px 12px", borderRadius: 10, fontSize: 11, fontWeight: 700, fontFamily: FONT,
                    }}>{config.tagLabel}</span>
                    <span style={{ color: C.muted, fontSize: 12, fontFamily: FONT }}>\u05E9\u05DC\u05D1 {stepNum}</span>
                  </div>

                  {/* Selected photo */}
                  {d.photo !== undefined && photos[d.photo] && (
                    <div style={{ textAlign: "center", marginBottom: 16 }}>
                      <img src={photos[d.photo]} alt="\u05EA\u05DE\u05D5\u05E0\u05D4 \u05E0\u05D1\u05D7\u05E8\u05EA"
                        style={{
                          width: 120, height: 120, borderRadius: 10, objectFit: "cover",
                          border: `3px solid ${C.yellow}`,
                          boxShadow: `0 0 0 3px ${C.yellow}33`,
                        }}
                      />
                    </div>
                  )}

                  {/* Answers */}
                  {textQs.map(q => {
                    const val = d[q.key];
                    if (!val || (Array.isArray(val) && val.length === 0)) return null;
                    return (
                      <div key={q.key} style={{ marginBottom: 12 }}>
                        <div style={{ color: C.muted, fontSize: 12, marginBottom: 4, textAlign: "right", fontFamily: FONT }}>
                          {q.label}
                        </div>
                        <div style={{
                          color: C.white, fontSize: 14, background: C.bgInput,
                          padding: "9px 14px", borderRadius: 8,
                          textAlign: "right", lineHeight: 1.7, fontFamily: FONT,
                        }}>
                          {Array.isArray(val) ? val.join(" ‚Ä¢ ") : val}
                        </div>
                      </div>
                    );
                  })}

                  {/* Slider badge \u2014 only for steps with a slider */}
                  {sliderVal !== null && (
                    <div style={{
                      marginTop: 10, display: "flex",
                      justifyContent: "flex-end", alignItems: "center", gap: 10,
                    }}>
                      <div style={{
                        background: C.yellow, color: C.dark,
                        padding: "5px 16px", borderRadius: 20,
                        fontWeight: 700, fontSize: 14, fontFamily: FONT,
                      }}>{sliderVal}/5</div>
                      <span style={{ color: C.muted, fontSize: 13, fontFamily: FONT }}>{sliderLabels[stepNum]}</span>
                    </div>
                  )}
                </div>
              );
            })}

            {/* \u05EA\u05D5\u05D1\u05E0\u05D5\u05EA \u05D0\u05D9\u05E9\u05D9\u05D5\u05EA */}
            <div style={{ background: C.bgCard, borderRadius: 14, padding: 20, marginBottom: 14 }}>
              <div style={{ color: C.white, fontWeight: 700, fontSize: 16, textAlign: "right", marginBottom: 12, fontFamily: FONT }}>
                \u05EA\u05D5\u05D1\u05E0\u05D5\u05EA \u05D0\u05D9\u05E9\u05D9\u05D5\u05EA \u05E9\u05DC\u05DA
              </div>
              <textarea
                value={insights}
                onChange={e => setInsights(e.target.value)}
                placeholder="\u05DB\u05EA\u05D5\u05D1 \u05D0\u05EA \u05D4\u05EA\u05D5\u05D1\u05E0\u05D5\u05EA \u05D5\u05D4\u05DC\u05E7\u05D7\u05D9\u05DD \u05E9\u05DC\u05DA \u05DE\u05D4\u05EA\u05D4\u05DC\u05D9\u05DA..."
                rows={5}
                style={{
                  width: "100%", boxSizing: "border-box",
                  background: C.bgInput, color: C.white,
                  border: "none", borderRadius: 10,
                  padding: "12px 14px", fontSize: 14,
                  fontFamily: FONT, resize: "vertical",
                  textAlign: "right", direction: "rtl",
                  outline: "none", lineHeight: 1.7,
                }}
              />
              <div style={{ color: C.muted, fontSize: 12, textAlign: "right", marginTop: 6, fontFamily: FONT }}>
                \u05D4\u05D4\u05E2\u05E8\u05D5\u05EA \u05E9\u05DC\u05DA \u05EA\u05D9\u05E9\u05DE\u05E8 \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05EA
              </div>
            </div>

            {/* \u05D4\u05E2\u05E8\u05D4 \u05D0\u05D9\u05E9\u05D9\u05EA \u05E1\u05D9\u05D5\u05DD */}
            <div style={{ background: C.bgCard, borderRadius: 14, padding: 20, marginBottom: 28 }}>
              <div style={{ color: C.white, fontWeight: 700, fontSize: 16, textAlign: "right", marginBottom: 12, fontFamily: FONT }}>
                \u05D4\u05E2\u05E8\u05D4 \u05D0\u05D9\u05E9\u05D9\u05EA \u05E1\u05D9\u05D5\u05DD
              </div>
              <textarea
                value={closingNote}
                onChange={e => setClosingNote(e.target.value)}
                placeholder="\u05DB\u05EA\u05D5\u05D1 \u05DE\u05E9\u05D4\u05D5 \u05D0\u05D9\u05E9\u05D9 \u05E9\u05DE\u05E1\u05DB\u05DD \u05D0\u05EA \u05D4\u05EA\u05D4\u05DC\u05D9\u05DA \u05E9\u05DC\u05DA..."
                rows={5}
                style={{
                  width: "100%", boxSizing: "border-box",
                  background: C.bgInput, color: C.white,
                  border: "none", borderRadius: 10,
                  padding: "12px 14px", fontSize: 14,
                  fontFamily: FONT, resize: "vertical",
                  textAlign: "right", direction: "rtl",
                  outline: "none", lineHeight: 1.7,
                }}
              />
              <div style={{ color: C.muted, fontSize: 12, textAlign: "right", marginTop: 6, fontFamily: FONT }}>
                \u05D4\u05D4\u05E2\u05E8\u05D4 \u05EA\u05E9\u05DE\u05E8 \u05D0\u05D5\u05D8\u05D5\u05DE\u05D8\u05D9\u05EA
              </div>
            </div>

            {/* \u05D4\u05D5\u05D3\u05E2\u05EA \u05D0\u05D9\u05E9\u05D5\u05E8 */}
            {copyMsg && (
              <div style={{
                background: C.yellow, color: C.dark, borderRadius: 10,
                padding: "10px 18px", textAlign: "center", fontFamily: FONT,
                fontWeight: 700, fontSize: 14, marginBottom: 12,
              }}>{copyMsg}</div>
            )}

            {/* 3 \u05DB\u05E4\u05EA\u05D5\u05E8\u05D9\u05DD */}
            <div style={{ display: "flex", gap: 12, marginBottom: 28 }}>
              {/* \u05EA\u05D4\u05DC\u05D9\u05DA \u05D7\u05D3\u05E9 */}
              <button onClick={onRestart} style={{
                flex: 1, background: C.bgCard, color: C.white,
                border: "none", borderRadius: 14, padding: "18px 10px",
                fontSize: 14, fontFamily: FONT, cursor: "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 8,
              }}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                  <path d="M3 3v5h5"/>
                </svg>
                \u05EA\u05D4\u05DC\u05D9\u05DA \u05D7\u05D3\u05E9
              </button>

              {/* \u05D4\u05D5\u05E8\u05D3 PDF */}
              <button onClick={handleDownload} style={{
                flex: 1, background: C.yellow, color: C.dark,
                border: "none", borderRadius: 14, padding: "18px 10px",
                fontSize: 14, fontFamily: FONT, cursor: "pointer", fontWeight: 700,
                display: "flex", flexDirection: "column", alignItems: "center", gap: 8,
              }}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="7 10 12 15 17 10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                \u05D4\u05D5\u05E8\u05D3 PDF
              </button>

              {/* \u05E9\u05EA\u05E3 */}
              <button onClick={handleShare} style={{
                flex: 1, background: C.bgCard, color: C.white,
                border: "none", borderRadius: 14, padding: "18px 10px",
                fontSize: 14, fontFamily: FONT, cursor: "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 8,
              }}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
                \u05E9\u05EA\u05E3
              </button>
            </div>

            <Footer />
          </div>
        </div>
      );
    }

    // =====================
    // MAIN APP
    // =====================

    const defaultData = () => ({
      1: { photo: undefined, impact: 3 },
      2: { photo: undefined, pressure: 3 },
      3: { photo: undefined, worry: 3 },
      4: { photo: undefined },
    });

    function App() {
      const [page, setPage] = useState("home");
      const [stepData, setStepData] = useState(defaultData());
      const [sharedInsights, setSharedInsights] = useState("");
      const [sharedClosingNote, setSharedClosingNote] = useState("");

      // \u05E7\u05E8\u05D9\u05D0\u05EA \u05E0\u05EA\u05D5\u05E0\u05D9\u05DD \u05DE\u05D4-URL \u05D1\u05D8\u05E2\u05D9\u05E0\u05D4 \u05E8\u05D0\u05E9\u05D5\u05E0\u05D9\u05EA
      useEffect(() => {
        try {
          const hash = window.location.hash;
          if (hash.startsWith("#d=")) {
            const decoded = JSON.parse(decodeURIComponent(atob(hash.slice(3))));
            if (decoded && decoded.s) {
              setStepData(decoded.s);
              if (decoded.i) setSharedInsights(decoded.i);
              if (decoded.c) setSharedClosingNote(decoded.c);
              setPage("summary");
            }
          }
        } catch(e) {}
      }, []);

      useEffect(() => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, [page]);

      const updateStep = (num, data) => setStepData(prev => ({ ...prev, [num]: data }));

      if (page === "home") return <HomePage onStart={() => setPage(1)} />;

      if (page === "summary") return (
        <SummaryPage
          allData={stepData}
          initialInsights={sharedInsights}
          initialClosingNote={sharedClosingNote}
          onRestart={() => {
            setStepData(defaultData());
            setSharedInsights("");
            setSharedClosingNote("");
            window.location.hash = "";
            setPage("home");
          }}
        />
      );

      return (
        <StepPage
          stepNum={page}
          data={stepData[page]}
          setData={d => updateStep(page, d)}
          onNext={() => setPage(page === 4 ? "summary" : page + 1)}
          onBack={() => setPage(page === 1 ? "home" : page - 1)}
        />
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
